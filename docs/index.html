<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustyBank Online</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#eef2f7;
}

.header{
    background:#0a2e63;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:420px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 6px 18px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#1b4db1;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#123a85;
}

.dashboard{
    display:none;
}

.card{
    background:linear-gradient(135deg,#0a2e63,#1b4db1);
    color:white;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
}

.balance{
    font-size:26px;
    color:#0a8a2a;
    margin-bottom:15px;
}

.transactions{
    max-height:200px;
    overflow-y:auto;
    font-size:14px;
}

.tx{
    border-bottom:1px solid #eee;
    padding:6px 0;
}

.footer{
    text-align:center;
    padding:15px;
    font-size:12px;
    color:#777;
}
</style>
</head>

<body>

<div class="header">TrustyBank Online Banking</div>

<div class="container" id="authSection">

<h3>Open Account</h3>
<input id="newUser" placeholder="Full Name">
<input type="password" id="newPassword" placeholder="Create Password">
<input type="password" id="newPin" placeholder="Create 4-Digit Transaction PIN">
<button onclick="openAccount()">Open Account</button>

<hr>

<h3>Login</h3>
<input id="loginUser" placeholder="Full Name">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>

</div>

<div class="container dashboard" id="dashboard">

<div class="card">
    <div>TrustyBank Debit Card</div>
    <h3 id="cardName">Account Holder</h3>
    <div>Card: 4000 5678 9012 3456</div>
    <div>Exp: 12/28</div>
</div>

<div class="balance">
Balance: $<span id="balanceAmount">100000.00</span>
</div>

<input id="amount" placeholder="Enter Amount">
<input type="password" id="transactionPin" placeholder="Enter Transaction PIN">

<button onclick="deposit()">Deposit</button>
<button onclick="transfer()">Transfer</button>
<button onclick="logout()">Logout</button>

<h3>Transaction History</h3>
<div class="transactions" id="transactionList"></div>

</div>

<div class="footer">
© 2026 TrustyBank Demo – Educational Use Only
</div>

<script>

let account = {
    name:"",
    password:"",
    pin:"",
    balance:100000.00,
    transactions:[]
};

function openAccount(){
    let name = document.getElementById("newUser").value;
    let password = document.getElementById("newPassword").value;
    let pin = document.getElementById("newPin").value;

    if(name && password && pin.length === 4){
        account.name = name;
        account.password = password;
        account.pin = pin;
        document.getElementById("cardName").innerText = name;
        alert("Account Opened Successfully with $100,000.00");
    } else {
        alert("Please fill all fields correctly (PIN must be 4 digits).");
    }
}

function login(){
    let name = document.getElementById("loginUser").value;
    let password = document.getElementById("loginPassword").value;

    if(name === account.name && password === account.password){
        document.getElementById("authSection").style.display="none";
        document.getElementById("dashboard").style.display="block";
        updateUI();
    } else {
        alert("Invalid Login Details");
    }
}

function deposit(){
    let amt = parseFloat(document.getElementById("amount").value);
    let pin = document.getElementById("transactionPin").value;

    if(pin !== account.pin){
        alert("Invalid Transaction PIN");
        return;
    }

    if(amt > 0){
        account.balance += amt;
        account.transactions.unshift("Deposit +$" + amt.toFixed(2));
        updateUI();
    }
}

function transfer(){
    let amt = parseFloat(document.getElementById("amount").value);
    let pin = document.getElementById("transactionPin").value;

    if(pin !== account.pin){
        alert("Invalid Transaction PIN");
        return;
    }

    if(amt > 0 && amt <= account.balance){
        account.balance -= amt;
        account.transactions.unshift("Transfer -$" + amt.toFixed(2));
        updateUI();
    } else {
        alert("Insufficient Balance");
    }
}

function updateUI(){
    document.getElementById("balanceAmount").innerText = account.balance.toFixed(2);
    let list = document.getElementById("transactionList");
    list.innerHTML="";
    account.transactions.forEach(tx=>{
        list.innerHTML += "<div class='tx'>" + tx + "</div>";
    });
}

function logout(){
    document.getElementById("authSection").style.display="block";
    document.getElementById("dashboard").style.display="none";
}

</script>

</body>
</html>
